name: Secret Setup
description: Set a Firebase App Hosting secret
labels: [secrets, deployment]
body:
  - type: input
    id: secret-name
    attributes:
      label: Secret Name
      description: The name of the Firebase secret
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Source
      description: Where to get this secret (e.g., Clerk Dashboard, Stripe Dashboard)
    validations:
      required: true
